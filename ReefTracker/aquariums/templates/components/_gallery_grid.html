{% for photo in photos %}
<div class="col-6 col-md-3 position-relative">
    <a href="{{ photo.image.url }}" data-lightbox="gallery" data-title="{{ photo.caption }}">
        <img src="{{ photo.image.url }}" class="img-fluid rounded shadow-sm bg-dark" style="height: 150px; width: 100%; object-fit: contain">
        <div class="overlay position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center opacity-0 hover-opacity-100 bg-dark bg-opacity-50 transition-all">
            <span class="text-white fw-bold"><i class="fas fa-search-plus"></i> View</span>
        </div>
    </a>

    {% if photo.livestock %}
    <form action="{% url 'aquariums:delete_livestock_photo' aquarium_id=photo.livestock.aquarium.id livestock_id=photo.livestock.id photo_id=photo.id %}" 
          method="post" class="position-absolute top-0 end-0 m-1 p-0" style="margin: 0 !important">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-sm" style="padding: 2px 8px" 
                onclick="return confirm('Are you sure you want to delete this photo?');">
            <i class="fas fa-trash"></i>
        </button>
    </form>
    {% endif %}
</div>
{% empty %}
    <p class="text-muted">No photos found.</p>
{% endfor %}
