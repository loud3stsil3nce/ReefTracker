{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <div class="card border-danger shadow">
        <div class="card-body py-5">
          <h1 class="text-danger mb-4"><i class="fas fa-exclamation-triangle"></i> Are you sure?</h1>
          <p class="lead">
            You are about to remove <strong>{{ livestock_item }}</strong> from {{ aquarium.name }}.
          </p>
          <p class="text-muted">This action cannot be undone.</p>
          
          <form method="POST" class="mt-4">
            {% csrf_token %}
            <a href="{% url 'aquariums:livestock' aquarium.id %}" class="btn btn-secondary me-2">Cancel, keep it</a>
            <button type="submit" class="btn btn-danger">Yes, remove it</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
