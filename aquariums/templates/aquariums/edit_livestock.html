{% extends "base.html" %} {% load crispy_forms_tags %} {% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Edit: {{ livestock_item }}</h4>
        </div>
        <div class="card-body">
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %} {{ form|crispy }}
            <div class="mt-3">
              <button type="submit" class="btn btn-primary">
                Save Changes
              </button>
              <a
                href="{% url 'aquariums:livestock' aquarium.id %}"
                class="btn btn-secondary"
                >Cancel</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const categoryDropdown = document.getElementById("id_category_filter");
    const speciesDropdown = document.getElementById("id_species");

    categoryDropdown.addEventListener("change", function () {
      const categoryId = this.value;
      const url = `{% url 'aquariums:ajax_load_species' %}?category=${categoryId}`;

      fetch(url)
        .then((response) => response.json())
        .then((data) => {
          speciesDropdown.innerHTML = '<option value="">---------</option>';
          data.forEach((item) => {
            const option = new Option(item.common_name, item.id);
            speciesDropdown.add(option);
          });
        });
    });
  });
</script>
{% endblock %}
