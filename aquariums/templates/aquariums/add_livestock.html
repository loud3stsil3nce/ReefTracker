{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Add Inhabitant to {{ aquarium.name }}</h4>
        </div>
        <div class="card-body">
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-3">
              <button type="submit" class="btn btn-success">Save Livestock</button>
              <a href="{% url 'aquariums:aquariumview' aquarium.id %}" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>



<script>
  // Wait for the page to load
  document.addEventListener('DOMContentLoaded', function() {
    
    // Get the two dropdowns
    const categoryDropdown = document.getElementById('id_category_filter');
    const speciesDropdown = document.getElementById('id_species');

    // When the category dropdown changes...
    categoryDropdown.addEventListener('change', function() {
      const categoryId = this.value;
      
      // Build the URL we created in Step 3
      const url = `{% url 'aquariums:ajax_load_species' %}?category=${categoryId}`;

      // Ask the server for the new species list
      fetch(url)
        .then(response => response.json())
        .then(data => {
          // 1. Clear out the old options in the Species dropdown
          speciesDropdown.innerHTML = '<option value="">---------</option>';
          
          // 2. Loop through the new data and add them
          data.forEach(item => {
            const option = new Option(item.common_name, item.id);
            speciesDropdown.add(option);
          });
        });
    });
  });
</script>
{% endblock %}
